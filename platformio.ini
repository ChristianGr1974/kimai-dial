; PlatformIO project for Kimai-Dial (M5Stack M5Dial, ESP32-S3)
[env:m5dial]
platform = espressif32
; M5Dial has no dedicated official board ID in upstream platformio boards as of writing this.
; Falling back to the generic ESP32-S3 devkit board and applying the build flags
; recommended by M5Unified examples for M5Dial (PSRAM, USB CDC for Serial-over-USB, etc).
board = esp32-s3-devkitm-1
framework = arduino

monitor_speed = 115200
upload_port = /dev/cu.usbmodem1101
monitor_port = /dev/cu.usbmodem1101

; M5Dial has no PSRAM chip, so BOARD_HAS_PSRAM must NOT be set (it crashes the
; bootloader trying to init nonexistent PSRAM).
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    m5stack/M5Unified
    m5stack/M5GFX
    m5stack/M5Dial
    bblanchon/ArduinoJson
    ; QR-Code-Generierung fuer die AP-/LAN-Setup-Screens (WiFi-QR + URL-QR).
    ; Exakter Registry-Name "ricmoo/QRCode" wie recherchiert (pio pkg search qrcode),
    ; entspricht dem bekannten GitHub-Repo github.com/ricmoo/QRCode.
    ricmoo/QRCode
